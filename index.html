<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FX Charts</title>
  <style>
    body { margin: 0; padding: 0; background: #131722; font-family: Arial, sans-serif; }

    #controls {
      background: #1e222d;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #2a2e39;
    }

    button {
      padding: 6px 14px;
      background: #2a2e39;
      color: #9598a1;
      border: 1px solid #363a45;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button.active {
      background: #2962ff;
      color: #ffffff;
      border-color: #2962ff;
    }

    .sep { color: #363a45; font-size: 18px; }

    #chart-container {
      width: 100%;
      height: calc(100vh - 52px);
    }
  </style>
</head>
<body>

<div id="controls">
  <strong style="color:#fff;margin-right:4px;">Pair:</strong>
  <button class="active" onclick="changePair('FX:AUDUSD', this)">AUD/USD</button>
  <button onclick="changePair('FX:EURUSD', this)">EUR/USD</button>
  <button onclick="changePair('FX:GBPJPY', this)">GBP/JPY</button>
  <button onclick="changePair('FX:USDJPY', this)">USD/JPY</button>

  <span class="sep">|</span>

  <strong style="color:#fff;margin-right:4px;">Interval:</strong>
  <button onclick="changeInterval('60', this)">1H</button>
  <button class="active" onclick="changeInterval('240', this)">4H</button>
  <button onclick="changeInterval('D', this)">1D</button>
  <button onclick="changeInterval('W', this)">1W</button>
</div>

<div id="chart-container"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  var pair = 'FX:AUDUSD';
  var tf = '240';
  var tvWidget = null;

  function loadChart() {
    document.getElementById('chart-container').innerHTML = '';
    tvWidget = new TradingView.widget({
      autosize: true,
      symbol: pair,
      interval: tf,
      container_id: 'chart-container',
      datafeed: undefined,
      library_path: undefined,
      locale: 'en',
      timezone: 'Etc/UTC',
      theme: 'dark',
      style: '1',
      enable_publishing: false,
      allow_symbol_change: false
    });
  }

  function changePair(newPair, btn) {
    pair = newPair;
    document.querySelectorAll('#controls button').forEach(function(b) {
      if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf('changePair') > -1) {
        b.classList.remove('active');
      }
    });
    btn.classList.add('active');
    loadChart();
  }

  function changeInterval(newTF, btn) {
    tf = newTF;
    document.querySelectorAll('#controls button').forEach(function(b) {
      if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf('changeInterval') > -1) {
        b.classList.remove('active');
      }
    });
    btn.classList.add('active');
    loadChart();
  }

  loadChart();
</script>
</body>
</html>
